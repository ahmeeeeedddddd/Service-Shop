<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="customers">Customers - Motor Garage</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
            </div>
            <div class="shop-name">
                <h1 data-i18n="appName">El Ansary</h1>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="customers.html" class="nav-item active">
                <span data-i18n="customers">Customers</span>
            </a>
            <a href="billing.html" class="nav-item">
                <span data-i18n="billing">Billing</span>
            </a>
            <a href="parts.html" class="nav-item">
                <span data-i18n="parts">Parts & Stock</span>
            </a>
            <a href="suppliers.html" class="nav-item">
                <span data-i18n="suppliers">Suppliers</span>
            </a>
            <a href="income.html" class="nav-item">
                <span data-i18n="income">Income</span>
            </a>
            <a href="expenses.html" class="nav-item">
                <span data-i18n="expenses">Expenses</span>
            </a>
            <a href="bills_history.html" class="nav-item">
                <span data-i18n="billsHistory">Bills History</span>
            </a>
            <a href="daily_report.html" class="nav-item">
                <span data-i18n="dailyReport">Daily Report</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="lang-btn" id="langToggle" data-i18n="langToggle">العربية</button>
            <div class="version-info" data-i18n="version">Version 1.0 — Works offline</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <h2 data-i18n="customers">Customers</h2>
            <p data-i18n="customersSubtitle">Manage customer records and service history</p>
        </header>

        <div class="card" style="margin-bottom: 1rem;">
            <div class="flex gap-2 mb-4">
                <button class="btn btn-primary" id="tabAddCustomer" data-i18n="addCustomer">Add customer</button>
                <button class="btn btn-outline" id="tabSearchCustomer" data-i18n="searchCustomer">Search customer</button>
            </div>

            <!-- View: Add Customer -->
            <div id="viewAddCustomer">
                <div class="stat-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                    <div class="form-group">
                        <label data-i18n="customerNameLabel">Customer name</label>
                        <input type="text" id="addName" class="form-control" data-i18n-placeholder="egJohnSmith" placeholder="e.g. John Smith">
                    </div>
                    <div class="form-group">
                        <label data-i18n="phone">Phone number</label>
                        <input type="text" id="addPhone" class="form-control" placeholder="050-123-4567">
                    </div>
                </div>

                <div class="stat-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                    <div class="form-group">
                        <label data-i18n="carName">Car name</label>
                        <input type="text" id="addCarName" class="form-control" placeholder="Toyota Camry 2020">
                    </div>
                    <div class="form-group">
                        <label data-i18n="licensePlate">License plate</label>
                        <input type="text" id="addPlate" class="form-control" placeholder="ABC 1234">
                    </div>
                </div>

                <button class="btn btn-primary mt-4" id="saveCustomerBtn" data-i18n="saveCustomer">Save customer</button>
            </div>

            <!-- View: Search Customer -->
            <div id="viewSearchCustomer" style="display: none;">
                <div class="form-group" style="position: relative;">
                    <label data-i18n="search">Search</label>
                    <input type="text" id="customerSearch" class="form-control" data-i18n-placeholder="searchCustomer" placeholder="Search by name or phone...">
                    <div id="searchResults" class="search-results-container"></div>
                </div>

                <!-- Customer Info Card -->
                <div id="customerInfoCard" class="card mt-4" style="display: none; background: #f8fafc;">
                    <h3 class="card-title text-teal" id="infoName">Customer Name</h3>
                    <div class="stat-grid" style="grid-template-columns: 1fr 1fr 1fr; margin-bottom: 0;">
                        <div>
                            <small style="color: #64748b;" data-i18n="phone">Phone</small>
                            <div id="infoPhone" class="font-bold"></div>
                        </div>
                        <div>
                            <small style="color: #64748b;" data-i18n="carName">Car</small>
                            <div id="infoCar" class="font-bold"></div>
                        </div>
                        <div>
                            <small style="color: #64748b;" data-i18n="plateNumber">Plate</small>
                            <div id="infoPlate" class="font-bold"></div>
                        </div>
                    </div>
                </div>

                <!-- Repairs History Table -->
                <div id="repairsHistorySection" class="mt-4" style="display: none;">
                    <h3 class="card-title" data-i18n="serviceHistory">Service History</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th data-i18n="date">Date</th>
                                    <th data-i18n="description">Description</th>
                                    <th data-i18n="total">Total</th>
                                    <th data-i18n="paymentMethod">Payment Method</th>
                                </tr>
                            </thead>
                            <tbody id="repairsTableBody">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="../js/i18n.js"></script>
    <script src="../js/customers.js"></script>
</body>
</html>
