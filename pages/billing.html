<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="billingTitle">Billing - Motor Garage</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
            </div>
            <div class="shop-name">
                <h1 data-i18n="appName">El Ansary</h1>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="customers.html" class="nav-item">
                <span data-i18n="customers">Customers</span>
            </a>
            <a href="billing.html" class="nav-item active">
                <span data-i18n="billing">Billing</span>
            </a>
            <a href="parts.html" class="nav-item">
                <span data-i18n="parts">Parts & Stock</span>
            </a>
            <a href="suppliers.html" class="nav-item">
                <span data-i18n="suppliers">Suppliers</span>
            </a>
            <a href="income.html" class="nav-item">
                <span data-i18n="income">Income</span>
            </a>
            <a href="expenses.html" class="nav-item">
                <span data-i18n="expenses">Expenses</span>
            </a>
            <a href="bills_history.html" class="nav-item">
                <span data-i18n="billsHistory">Bills History</span>
            </a>
            <a href="daily_report.html" class="nav-item">
                <span data-i18n="dailyReport">Daily Report</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="lang-btn" id="langToggle" data-i18n="langToggle">العربية</button>
            <div class="version-info" data-i18n="version">Version 1.0 — Works offline</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <h2 data-i18n="billingTitle">Billing</h2>
            <p data-i18n="billingSubtitle">Create a new invoice for a customer</p>
        </header>

        <div class="flex gap-2" style="align-items: flex-start;">
            <!-- Billing Form -->
            <div style="flex: 2;">
                <div class="card">
                    <div class="form-group" style="position: relative;">
                        <label data-i18n="customer">Customer</label>
                        <input type="text" id="customerSearch" class="form-control" data-i18n-placeholder="searchCustomer" placeholder="Search by name or phone...">
                        <div id="searchResults" class="search-results-container"></div>
                    </div>
                    
                    <div class="stat-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                        <div class="form-group">
                            <label data-i18n="customer">Name</label>
                            <input type="text" id="customerName" class="form-control" readonly>
                        </div>
                        <div class="form-group">
                            <label data-i18n="phone">Phone</label>
                            <input type="text" id="customerPhone" class="form-control" readonly>
                        </div>
                    </div>

                    <div class="stat-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                        <div class="form-group">
                            <label data-i18n="carModel">Car Model</label>
                            <input type="text" id="carModel" class="form-control" readonly>
                        </div>
                        <div class="form-group">
                            <label data-i18n="plateNumber">Plate Number</label>
                            <input type="text" id="plateNumber" class="form-control" readonly>
                        </div>
                    </div>

                    <div class="form-group">
                        <label data-i18n="notes">Notes (Optional)</label>
                        <textarea id="notes" class="form-control" rows="2"></textarea>
                    </div>

                    <div class="mt-4">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="card-title" style="margin-bottom: 0;" data-i18n="lineItems">Line items</h3>
                            <button class="btn btn-outline" id="addItemBtn">
                                <span>+</span> <span data-i18n="addItem">Add item</span>
                            </button>
                        </div>
                        
                        <div class="table-container">
                            <table id="billingTable">
                                <thead>
                                    <tr>
                                        <th data-i18n="serviceName">Service / Part name</th>
                                        <th style="width: 80px;" data-i18n="qty">Qty</th>
                                        <th style="width: 120px;" data-i18n="price">Price</th>
                                        <th style="width: 120px;" data-i18n="subtotal">Subtotal</th>
                                        <th style="width: 50px;"></th>
                                    </tr>
                                </thead>
                                <tbody id="lineItemsBody">
                                    <!-- Row Template -->
                                    <tr>
                                        <td><input type="text" class="form-control" placeholder="e.g. Oil change"></td>
                                        <td><input type="number" class="form-control qty-input" value="1" min="1"></td>
                                        <td><input type="number" class="form-control price-input" value="0" min="0"></td>
                                        <td class="font-bold text-teal line-subtotal">$0.00</td>
                                        <td><button class="btn btn-outline" style="color: #ef4444; border-color: #fee2e2;">×</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Summary Card -->
            <div style="flex: 1;">
                <div class="card">
                    <div class="stat-label" data-i18n="total">Total</div>
                    <div class="stat-value text-teal" id="grandTotal" style="margin-bottom: 1.5rem;">$0.00</div>

                    <div class="form-group">
                        <label data-i18n="paymentMethod">Payment method</label>
                        <div class="flex gap-2">
                            <button class="btn btn-primary w-full" id="payCash" data-i18n="cash">Cash</button>
                            <button class="btn btn-outline w-full" id="payCard" data-i18n="card">ATM / Card</button>
                        </div>
                    </div>

                    <button class="btn btn-primary w-full mt-4" id="confirmPrintBtn" style="padding: 1rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        <span data-i18n="confirmPrint">Confirm & Print</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Receipt Modal -->
    <div class="modal" id="receiptModal">
        <div class="modal-content">
            <div class="print-area" id="receiptContent">
                <!-- Receipt UI generated by JS -->
            </div>
            <div class="flex justify-between mt-4 no-print">
                <button class="btn btn-outline" id="closeModalBtn" data-i18n="close">Close</button>
                <button class="btn btn-primary" id="printReceiptBtn" data-i18n="print">Print</button>
            </div>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/billing.js"></script>
</body>
</html>
