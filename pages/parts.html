<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="parts">Parts & Stock - El Ansary</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
            </div>
            <div class="shop-name">
                <h1 data-i18n="appName">El Ansary</h1>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="customers.html" class="nav-item">
                <span data-i18n="customers">Customers</span>
            </a>
            <a href="billing.html" class="nav-item">
                <span data-i18n="billing">Billing</span>
            </a>
            <a href="pending_bills.html" class="nav-item">
                <span data-i18n="pendingBills">Pending Bills</span>
            </a>
            <a href="parts.html" class="nav-item active">
                <span data-i18n="parts">Parts & Stock</span>
            </a>
            <a href="suppliers.html" class="nav-item">
                <span data-i18n="suppliers">Suppliers</span>
            </a>
            <a href="income.html" class="nav-item">
                <span data-i18n="income">Income</span>
            </a>
            <a href="expenses.html" class="nav-item">
                <span data-i18n="expenses">Expenses</span>
            </a>
            <a href="bills_history.html" class="nav-item">
                <span data-i18n="billsHistory">Bills History</span>
            </a>
            <a href="daily_report.html" class="nav-item">
                <span data-i18n="dailyReport">Daily Report</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="lang-btn" id="langToggle" data-i18n="langToggle">العربية</button>
            <div class="version-info" data-i18n="version">Version 1.0 — Works offline</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <h2 data-i18n="parts">Parts & Stock</h2>
            <p data-i18n="partsSubtitle">Manage inventory, prices, and stock levels</p>
        </header>

        <div class="flex gap-2" style="align-items: flex-start;">
            
            <!-- Left Side: Table of Parts -->
            <div style="flex: 2;">
                <div class="card">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="card-title" style="margin-bottom: 0;" data-i18n="inventory">Inventory</h3>
                        <button class="btn btn-outline" id="printPartsBtn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                            <span data-i18n="printInventory">Print Inventory</span>
                        </button>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                <th data-i18n="partName">Part Name</th>
                                <th data-i18n="category">Category</th>
                                <th data-i18n="supplier">Supplier</th>
                                <th style="width: 100px;" data-i18n="qtyInStock">Qty</th>
                                <th style="width: 120px;" data-i18n="unitPrice">Unit Price</th>
                                <th style="width: 150px;"></th>
                            </tr>
                            </thead>
                            <tbody id="partsTableBody">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Side: Add Part Form -->
            <div style="flex: 1;">
                <div class="card">
                    <h3 class="card-title" data-i18n="addPart">Add New Part</h3>
                    <div class="form-group">
                        <label data-i18n="partName">Part Name</label>
                        <input type="text" id="partName" class="form-control" placeholder="e.g. Brake Pads Front">
                    </div>
                    <div class="form-group">
                        <label data-i18n="category">Category</label>
                        <select id="partCategory" class="form-control">
                            <option value="Engine">Engine</option>
                            <option value="Brakes">Brakes</option>
                            <option value="Suspension">Suspension</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Fluids">Fluids & Filters</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label data-i18n="supplier">Supplier</label>
                        <select id="partSupplier" class="form-control">
                            <option value="">No Supplier</option>
                            <!-- Populated via JS -->
                        </select>
                    </div>
                    <div class="stat-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                        <div class="form-group">
                            <label data-i18n="qtyInStock">Initial Qty</label>
                            <input type="number" id="partQty" class="form-control" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label data-i18n="unitPrice">Unit Price</label>
                            <input type="number" id="partPrice" class="form-control" value="0" min="0" step="0.01">
                        </div>
                    </div>
                    <div class="flex gap-2" style="margin-top: 1rem;">
                        <button class="btn btn-primary w-full" id="savePartBtn" data-i18n="savePart">Save Part</button>
                        <button class="btn btn-outline" id="cancelPartBtn" style="display: none; white-space: nowrap;">Cancel</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Print Preview Modal -->
    <div class="modal" id="printModal">
        <div class="modal-content" style="max-width: 900px;">
            <div id="printArea">
                <!-- Preview content here -->
            </div>
            <div class="flex justify-between mt-6 preview-actions">
                <button class="btn btn-outline" id="closePrintBtn" data-i18n="close">Close</button>
                <button class="btn btn-primary" id="confirmPrintBtn" data-i18n="print">Print</button>
            </div>
        </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/parts.js"></script>
</body>
</html>
