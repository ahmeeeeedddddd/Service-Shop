<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="expensesTitle">Expenses - Motor Garage</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
            </div>
            <div class="shop-name">
                <h1 data-i18n="appName">El Ansary</h1>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="customers.html" class="nav-item">
                <span data-i18n="customers">Customers</span>
            </a>
            <a href="billing.html" class="nav-item">
                <span data-i18n="billing">Billing</span>
            </a>
            <a href="pending_bills.html" class="nav-item">
                <span data-i18n="pendingBills">Pending Bills</span>
            </a>
            <a href="parts.html" class="nav-item">
                <span data-i18n="parts">Parts & Stock</span>
            </a>
            <a href="suppliers.html" class="nav-item">
                <span data-i18n="suppliers">Suppliers</span>
            </a>
            <a href="income.html" class="nav-item">
                <span data-i18n="income">Income</span>
            </a>
            <a href="expenses.html" class="nav-item active">
                <span data-i18n="expenses">Expenses</span>
            </a>
            <a href="bills_history.html" class="nav-item">
                <span data-i18n="billsHistory">Bills History</span>
            </a>
            <a href="daily_report.html" class="nav-item">
                <span data-i18n="dailyReport">Daily Report</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="lang-btn" id="langToggle" data-i18n="langToggle">العربية</button>
            <div class="version-info" data-i18n="version">Version 1.0 — Works offline</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <h2 data-i18n="expensesTitle">Expenses</h2>
            <p data-i18n="expensesSubtitle">Log and review all shop expenses</p>
        </header>

        <div class="flex gap-2" style="align-items: flex-start;">
            <!-- Log Expense Form -->
            <div style="flex: 1;">
                <div class="card">
                    <h3 class="card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        <span data-i18n="logExpense">Log expense</span>
                    </h3>
                    <form id="expenseForm">
                        <div class="form-group">
                            <label data-i18n="description">Description</label>
                            <input type="text" id="expDesc" class="form-control" placeholder="e.g. Tool purchase" required>
                        </div>
                        <div class="form-group">
                            <label data-i18n="amount">Amount</label>
                            <input type="number" id="expAmount" class="form-control" value="0" min="0" required>
                        </div>
                        <div class="form-group">
                            <label data-i18n="category">Category</label>
                            <select id="expCategory" class="form-control">
                                <option value="Rent" data-i18n="rent">Rent</option>
                                <option value="Parts" data-i18n="partsCat">Parts</option>
                                <option value="Utilities" data-i18n="utilities">Utilities</option>
                                <option value="Salaries" data-i18n="salaries">Salaries</option>
                                <option value="Other" data-i18n="other" selected>Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label data-i18n="date">Date</label>
                            <input type="date" id="expDate" class="form-control" required>
                        </div>
                        <input type="hidden" id="editingExpenseId" value="">
                        <div class="flex gap-2" style="margin-top: 1rem;">
                            <button type="submit" id="saveExpenseBtn" class="btn btn-primary w-full" data-i18n="saveExpense">Save expense</button>
                            <button type="button" id="cancelEditBtn" class="btn btn-outline" style="display: none; width: auto;" data-i18n="cancel">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Expense List & Stats -->
            <div style="flex: 2;">
                <div class="stat-card accent mb-4" style="flex-direction: row; justify-content: space-between; align-items: center; padding: 2rem;">
                    <div>
                        <span class="stat-label">Total logged expenses</span>
                        <div class="stat-value" id="totalExpenses">$0.00</div>
                    </div>
                    <div style="text-align: right;">
                        <input type="month" id="monthFilter" class="form-control" style="background: rgba(255,255,255,0.1); border: none; color: white;">
                    </div>
                </div>

                <div class="card">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex gap-2">
                            <div class="form-group" style="margin-bottom: 0;">
                                <label data-i18n="selectDate">Select Date</label>
                                <input type="date" id="filterDate" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th data-i18n="date">Date</th>
                                    <th data-i18n="description">Description</th>
                                    <th data-i18n="category">Category</th>
                                    <th data-i18n="amount">Amount</th>
                                    <th style="width: 140px;"></th>
                                </tr>
                            </thead>
                            <tbody id="expensesTableBody">
                                <!-- Dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/i18n.js"></script>
    <script src="../js/expenses.js"></script>
</body>
</html>
